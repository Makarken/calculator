<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bybit Calculator</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --border: #1e1e2e;
    --accent: #f0c040;
    --accent-dim: #f0c04022;
    --text: #e8e8f0;
    --muted: #5a5a72;
    --green: #4ade80;
    --green-dim: #4ade8018;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse 60% 40% at 50% 0%, #f0c04008 0%, transparent 70%);
    pointer-events: none;
  }

  .card {
    width: 100%;
    max-width: 400px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 40px 80px #000a;
  }

  .header {
    padding: 28px 28px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .logo {
    width: 36px;
    height: 36px;
    background: var(--accent);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    font-size: 14px;
    color: #000;
    flex-shrink: 0;
  }

  .header-text h1 {
    font-size: 16px;
    font-weight: 800;
    letter-spacing: -0.3px;
    color: var(--text);
  }

  .header-text p {
    font-size: 11px;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    margin-top: 2px;
  }

  .body {
    padding: 24px 28px 28px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .input-group label {
    display: block;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
    font-family: 'JetBrains Mono', monospace;
  }

  .input-wrap {
    position: relative;
    display: flex;
    align-items: center;
  }

  .currency-badge {
    position: absolute;
    left: 14px;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    font-size: 16px;
    color: var(--muted);
    pointer-events: none;
  }

  input[type="number"] {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 22px;
    font-weight: 700;
    padding: 14px 16px 14px 38px;
    outline: none;
    transition: border-color 0.2s;
    -moz-appearance: textfield;
  }

  input[type="number"]::-webkit-inner-spin-button,
  input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }

  input[type="number"]:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-dim);
  }

  input[type="number"]::placeholder { color: var(--muted); }

  .steps {
    display: flex;
    flex-direction: column;
    gap: 6px;
    padding: 14px 16px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 12px;
  }

  .step {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
  }

  .step-label { color: var(--muted); }
  .step-value { color: var(--text); }
  .step-value.accent { color: var(--accent); }

  .divider {
    height: 1px;
    background: var(--border);
    margin: 4px 0;
  }

  .result-box {
    background: var(--green-dim);
    border: 1px solid #4ade8030;
    border-radius: 14px;
    padding: 18px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s;
    position: relative;
    overflow: hidden;
  }

  .result-box:hover {
    background: #4ade8025;
    border-color: #4ade8050;
  }

  .result-box:active { transform: scale(0.99); }

  .result-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--green);
    font-family: 'JetBrains Mono', monospace;
    opacity: 0.7;
  }

  .result-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 28px;
    font-weight: 700;
    color: var(--green);
    line-height: 1;
  }

  .result-value span {
    font-size: 14px;
    opacity: 0.6;
    margin-left: 4px;
  }

  .copy-btn {
    background: #4ade8022;
    border: 1px solid #4ade8040;
    border-radius: 8px;
    color: var(--green);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    padding: 7px 12px;
    cursor: pointer;
    flex-shrink: 0;
    transition: all 0.15s;
    letter-spacing: 0.5px;
  }

  .copy-btn:hover { background: #4ade8035; }
  .copy-btn.copied { background: #4ade8050; color: #fff; }

  .empty {
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 22px;
  }

  .formula-hint {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    justify-content: center;
    padding-top: 4px;
  }

  .tag {
    background: var(--border);
    border-radius: 6px;
    padding: 4px 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--muted);
  }

  .tag b { color: var(--accent); }
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <div class="logo">₿</div>
    <div class="header-text">
      <h1>Bybit Calculator</h1>
      <p>USD → EUR + комиссия Bybit</p>
    </div>
  </div>

  <div class="body">
    <div class="input-group">
      <label>Сумма в долларах</label>
      <div class="input-wrap">
        <span class="currency-badge">$</span>
        <input type="number" id="usd" placeholder="0" autofocus oninput="calc()">
      </div>
    </div>

    <div class="steps" id="steps" style="display:none">
      <div class="step">
        <span class="step-label">Исходная сумма</span>
        <span class="step-value" id="s0">—</span>
      </div>
      <div class="step">
        <span class="step-label">× 0.86 (USD→EUR)</span>
        <span class="step-value accent" id="s1">—</span>
      </div>
      <div class="step">
        <span class="step-label">+ 1.7% (комиссия)</span>
        <span class="step-value accent" id="s2">—</span>
      </div>
    </div>

    <div class="result-box" id="resultBox" onclick="copy()">
      <div>
        <div class="result-label">К оплате</div>
        <div class="result-value" id="result"><span class="empty">—</span></div>
      </div>
      <button class="copy-btn" id="copyBtn">COPY</button>
    </div>

    <div class="formula-hint">
      <span class="tag">× <b>0.86</b></span>
      <span class="tag">× <b>1.017</b></span>
      <span class="tag">= <b>× 0.87462</b></span>
    </div>
  </div>
</div>

<script>
let lastResult = null;

function fmt(n) {
  return n.toLocaleString('ru-RU', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function calc() {
  const raw = parseFloat(document.getElementById('usd').value);
  const steps = document.getElementById('steps');

  if (!raw || isNaN(raw) || raw <= 0) {
    document.getElementById('result').innerHTML = '<span class="empty">—</span>';
    steps.style.display = 'none';
    lastResult = null;
    return;
  }

  const eur = raw * 0.86;
  const final = eur * 1.017;
  lastResult = Math.round(final * 100) / 100;

  steps.style.display = 'flex';
  document.getElementById('s0').textContent = '$' + fmt(raw);
  document.getElementById('s1').textContent = '€' + fmt(eur);
  document.getElementById('s2').textContent = '€' + fmt(final);

  document.getElementById('result').innerHTML =
    '€' + fmt(lastResult) + '<span>EUR</span>';

  document.getElementById('copyBtn').textContent = 'COPY';
  document.getElementById('copyBtn').classList.remove('copied');
}

function copy() {
  if (!lastResult) return;
  const text = lastResult.toFixed(2).replace('.', ',');
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = '✓ COPIED';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = 'COPY';
      btn.classList.remove('copied');
    }, 2000);
  });
}

document.getElementById('usd').addEventListener('keydown', e => {
  if (e.key === 'Enter') copy();
});
</script>
</body>
</html>
